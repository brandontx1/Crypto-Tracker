<html lang="en">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
:root {
  --bg:#090c10; --surface:#0e1318; --surface2:#141b22; --border:#1e2d3d;
  --text:#c9d8e8; --muted:#4a6278; --accent:#00e5ff;
  --green:#00ff88; --red:#ff3d5a; --gold:#ffc947; --silver:#b0c4d8; --purple:#a855f7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 700px 500px at 15% 15%,rgba(0,229,255,.05),transparent 65%),radial-gradient(ellipse 500px 700px at 85% 85%,rgba(168,85,247,.05),transparent 65%);pointer-events:none;z-index:0}
.wrap{max-width:1400px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

header{padding:22px 0 14px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-family:‘Space Mono’,monospace;font-size:20px;font-weight:700;letter-spacing:7px;color:var(–accent);text-shadow:0 0 24px rgba(0,229,255,.5)}
.logo em{color:var(–muted);font-style:normal}
.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ts{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);letter-spacing:1px}
.btn{background:#0a1018;border:1px solid #1e3a4a;color:var(–accent);padding:6px 16px;font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all .2s;border-radius:20px}
.btn:hover{background:#0e2030;border-color:var(–accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}

.tabs{display:flex;gap:8px;padding:14px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(–border)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 20px;background:#0a1018;border:1px solid #1a2a38;color:var(–muted);font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all .2s;white-space:nowrap;border-radius:20px}
.tab:hover{border-color:var(–muted);color:var(–text)}
.tab.active{background:#0d2035;border-color:var(–accent);color:var(–accent);font-weight:700}

.filter-row{display:flex;gap:8px;padding:10px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(–border)}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 16px;background:#0a1018;border:1px solid #1a2a38;color:var(–muted);font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all .2s;white-space:nowrap;border-radius:20px}
.filter-btn:hover{border-color:var(–muted);color:var(–text)}
.filter-btn.active-buy{background:#0a2018;border-color:var(–green);color:var(–green);font-weight:700}
.filter-btn.active-sell{background:#200a10;border-color:var(–red);color:var(–red);font-weight:700}
.filter-btn.active-watch{background:#201808;border-color:var(–gold);color:var(–gold);font-weight:700}
.filter-btn.active-hold{background:#0e1520;border-color:var(–muted);color:var(–text);font-weight:700}

.sig-bar{display:flex;gap:8px;padding:12px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(–border);min-height:48px;align-items:center}
.sig-bar::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:6px;padding:4px 12px;font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:1px;white-space:nowrap;border:1px solid;opacity:0;animation:fadeIn .5s ease forwards}
.pill.buy{border-color:var(–green);color:var(–green);background:rgba(0,255,136,.06)}
.pill.sell{border-color:var(–red);color:var(–red);background:rgba(255,61,90,.06)}
.pill.watch{border-color:var(–gold);color:var(–gold);background:rgba(255,201,71,.06)}
.pdot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:13px;padding:16px 0 40px}
.card{background:var(–surface);border:1px solid var(–border);padding:17px;position:relative;overflow:hidden;opacity:0;transform:translateY(6px);animation:slideUp .45s ease forwards}
.card::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:var(–ca,var(–accent));opacity:.75}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.aname{font-size:12px;font-weight:800;letter-spacing:2px}
.asym{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);margin-top:2px;letter-spacing:1px}
.pblock{text-align:right}
.price{font-family:‘Space Mono’,monospace;font-size:16px;font-weight:700}
.chg{font-family:‘Space Mono’,monospace;font-size:10px;margin-top:2px}
.chg.up{color:var(–green)}.chg.dn{color:var(–red)}
.spark{height:90px;margin:8px 0}
.inds{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.ind{background:var(–surface2);border:1px solid var(–border);padding:7px 8px}
.ilabel{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);letter-spacing:1px;margin-bottom:2px}
.ival{font-family:‘Space Mono’,monospace;font-size:12px;font-weight:700}
.isig{font-size:8px;margin-top:1px;letter-spacing:1px;font-family:‘Space Mono’,monospace}
.bar-bg{height:3px;background:var(–border);margin-top:4px;overflow:hidden}
.bar-fill{height:100%;transition:width 1s ease}
.ma-tag{font-family:‘Space Mono’,monospace;font-size:8px;padding:2px 5px;border:1px solid;letter-spacing:1px;display:inline-block;margin-top:3px}
.ma-tag.above{border-color:rgba(0,255,136,.4);color:var(–green)}
.ma-tag.below{border-color:rgba(255,61,90,.4);color:var(–red)}
.sbadge{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px;font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:2px;font-weight:700;margin-top:10px;border:1px solid;width:100%}
.sbadge.BUY{border-color:var(–green);color:var(–green);background:rgba(0,255,136,.07)}
.sbadge.SELL{border-color:var(–red);color:var(–red);background:rgba(255,61,90,.07)}
.sbadge.HOLD{border-color:var(–muted);color:var(–muted)}
.sbadge.WATCH{border-color:var(–gold);color:var(–gold);background:rgba(255,201,71,.07)}

#loader{position:fixed;inset:0;background:var(–bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:18px}
.ltext{font-family:‘Space Mono’,monospace;font-size:11px;letter-spacing:4px;color:var(–accent)}
.lbar{width:200px;height:2px;background:var(–border);overflow:hidden}
.lfill{height:100%;background:var(–accent);width:0;box-shadow:0 0 10px var(–accent);transition:width .4s ease}
.lsub{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);letter-spacing:2px}

.err-bar{font-family:‘Space Mono’,monospace;font-size:10px;color:var(–red);padding:10px 14px;border:1px solid var(–red);background:rgba(255,61,90,.06);margin:14px 0;letter-spacing:1px;display:none}
.api-src{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);padding:6px 0;letter-spacing:1px;border-top:1px solid var(–border);margin-top:8px}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){.grid{grid-template-columns:1fr}.logo{font-size:16px}}
</style>

<script>
let charts = {};

const COLORS = {
  BTC:'#f7931a',ETH:'#627eea',BNB:'#f3ba2f',SOL:'#9945ff',XRP:'#00aae4',
  DOGE:'#c3a634',ADA:'#0033ad',AVAX:'#e84142',LINK:'#375bd2',DOT:'#e6007a',
  NEAR:'#00c08b',UNI:'#ff007a',SHIB:'#e01a2c',LTC:'#bfbbbb',TRX:'#eb0029',
  ATOM:'#2e3148',XLM:'#14b6e7',AAVE:'#b6509e',MATIC:'#8247e5',OP:'#ff0420',
  ARB:'#12aaff',APT:'#0fa37f',INJ:'#00bcff',ICP:'#29abe2',TON:'#0098ea',
  GRT:'#6f4cff',RENDER:'#e03fff',STX:'#5546ff',FIL:'#0090ff',SUI:'#4da2ff',XAU:'#ffc947',XAG:'#b0c4d8'
};

const METAL_NAMES = { XAU:'GOLD', XAG:'SILVER' };

// ── HELPERS ───────────────────────────────────────────────────

function fetchWithTimeout(url, ms=9000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, {signal: ctrl.signal}).finally(() => clearTimeout(id));
}

// ── API FETCHERS ──────────────────────────────────────────────

async function fetchMetals() {
  // Fetch gold and silver separately so one failure doesn't kill the other
  const metals = [];

  // GOLD: pax-gold tracks spot gold (1 troy oz), price should be ~$2900-3200
  // tether-gold is backup
  try {
    const r = await fetchWithTimeout('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=pax-gold,tether-gold&sparkline=true&price_change_percentage=24h');
    if (r.ok) {
      const data = await r.json();
      // Pick whichever gold token returned, prefer pax-gold
      const gold = data.find(c => c.id === 'pax-gold') || data.find(c => c.id === 'tether-gold');
      if (gold && gold.current_price > 1000 && gold.current_price < 10000) {
        metals.push({
          symbol: 'XAU', name: 'GOLD',
          price: gold.current_price,
          chg24: gold.price_change_percentage_24h || 0,
          spark: gold.sparkline_in_7d?.price || [],
          type: 'metals', color: '#ffc947'
        });
      }
    }
  } catch(e) { console.warn('Gold fetch failed:', e.message); }

  // SILVER: use Kinesis Silver (KAG) — 1:1 backed by 1 troy oz silver, reliable pricing
  try {
    const r = await fetchWithTimeout('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=kinesis-silver&sparkline=true&price_change_percentage=24h');
    if (r.ok) {
      const data = await r.json();
      const silver = data.find(c => c.id === 'kinesis-silver');
      if (silver && silver.current_price > 20) {
        metals.push({
          symbol: 'XAG', name: 'SILVER',
          price: silver.current_price,
          chg24: silver.price_change_percentage_24h || 0,
          spark: silver.sparkline_in_7d?.price || [],
          type: 'metals', color: '#b0c4d8'
        });
      } else {
        metals.push({ symbol:'XAG', name:'SILVER', price:null, chg24:0, spark:[], type:'metals', color:'#b0c4d8', unavailable:true });
      }
    }
  } catch(e) {
    console.warn('Silver fetch failed:', e.message);
    metals.push({ symbol:'XAG', name:'SILVER', price:null, chg24:0, spark:[], type:'metals', color:'#b0c4d8', unavailable:true });
  }

  return metals;
}

async function tryCoingecko() {
  // Fetch actual top 30 by market cap dynamically — no hardcoded list
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1&sparkline=true&price_change_percentage=24h`;
  const r = await fetchWithTimeout(url);
  if (!r.ok) throw new Error('CoinGecko ' + r.status);
  const data = await r.json();
  return data.map(c => ({
    symbol: c.symbol.toUpperCase(),
    name: c.name.toUpperCase(),
    price: c.current_price,
    chg24: c.price_change_percentage_24h || 0,
    spark: c.sparkline_in_7d?.price || [],
    type: 'crypto',
    color: COLORS[c.symbol.toUpperCase()] || '#00e5ff'
  }));
}

async function tryCoincap() {
  const r = await fetchWithTimeout('https://api.coincap.io/v2/assets?limit=30');
  if (!r.ok) throw new Error('CoinCap ' + r.status);
  const json = await r.json();
  return (json.data || []).map(c => {
    const sym = c.symbol.toUpperCase();
    return {
      symbol: sym, name: c.name.toUpperCase(),
      price: parseFloat(c.priceUsd) || 0,
      chg24: parseFloat(c.changePercent24Hr) || 0,
      spark: [], type: 'crypto', color: COLORS[sym] || '#00e5ff'
    };
  });
}

async function tryBinance() {
  const symbols = ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','AVAXUSDT','LINKUSDT','DOTUSDT','NEARUSDT','UNIUSDT','LTCUSDT','ATOMUSDT','XLMUSDT','AAVEUSDT','MATICUSDT','OPUSDT','ARBUSDT','APTUSDT','INJUSDT','ICPUSDT','TONUSDT','GRTUSDT','FILUSDT'];
  const r = await fetchWithTimeout(`https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(symbols)}`);
  if (!r.ok) throw new Error('Binance ' + r.status);
  const data = await r.json();
  return data.map(c => {
    const sym = c.symbol.replace('USDT','');
    return {
      symbol: sym,
      name: sym,
      price: parseFloat(c.lastPrice) || 0,
      chg24: parseFloat(c.priceChangePercent) || 0,
      spark: [],
      type: 'crypto',
      color: COLORS[sym] || '#00e5ff'
    };
  });
}

// ── INDICATORS ───────────────────────────────────────────────

function calcRSI(prices, period=14) {
  if (!prices || prices.length < period+1) return null;
  let g=0, l=0;
  for (let i = prices.length-period; i < prices.length; i++) {
    const d = prices[i]-prices[i-1];
    if (d>0) g+=d; else l-=d;
  }
  const ag=g/period, al=l/period;
  if (al===0) return 100;
  return 100-(100/(1+(ag/al)));
}

function calcSMA(prices, n) {
  if (!prices || prices.length < n) return null;
  return prices.slice(-n).reduce((a,b)=>a+b,0)/n;
}

// Generate a plausible sparkline if none from API
function fakeSparkline(price, chg24) {
  const pts = 60;
  let p = price / (1 + chg24/100);
  const out = [];
  for (let i=0;i<pts;i++) {
    const noise = (Math.random()-.5)*p*0.014;
    p = p + (chg24/100)*p*(1/pts)*0.8 + noise;
    out.push(Math.max(p, 0.000001));
  }
  out[out.length-1] = price;
  return out;
}

function getSignal(rsi, price, sma20, sma50, chg24) {
  let score=0, reasons=[];
  if (rsi!==null) {
    if (rsi<30)      {score+=3;reasons.push('RSI oversold');}
    else if (rsi<42) {score+=1;reasons.push('RSI low');}
    else if (rsi>72) {score-=3;reasons.push('RSI overbought');}
    else if (rsi>62) {score-=1;reasons.push('RSI elevated');}
  }
  if (sma20&&sma50) {
    if (price>sma20&&sma20>sma50) {score+=1;reasons.push('Bullish MA stack');}
    if (price<sma20&&sma20<sma50) {score-=1;reasons.push('Bearish MA stack');}
    if (price<sma20*0.95)         {score+=1;reasons.push('Dip below MA20');}
    if (price>sma20*1.08)         {score-=1;reasons.push('Extended above MA20');}
  }
  if (chg24<-8) {score+=1;reasons.push('Large dip today');}
  if (chg24>12) {score-=1;reasons.push('Large pump today');}
  let signal='HOLD';
  if (score>=3) signal='BUY';
  else if (score>=1) signal='WATCH';
  else if (score<=-2) signal='SELL';
  return {signal, reason: reasons[0]||'Monitoring'};
}

function fmtPrice(p) {
  if (!p&&p!==0) return '$—';
  if (p>=1000) return '$'+p.toLocaleString('en-US',{maximumFractionDigits:0});
  if (p>=1)    return '$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:3});
  if (p>=0.001)return '$'+p.toFixed(5);
  return '$'+p.toFixed(8);
}

// ── RENDER ───────────────────────────────────────────────────

function renderCard(asset, idx) {
  // Handle unavailable assets (e.g. silver price not fetchable)
  if (asset.unavailable) {
    const card = document.createElement('div');
    card.className='card';
    card.dataset.type=asset.type;
    card.dataset.signal='HOLD';
    card.style.cssText=`--ca:${asset.color};animation-delay:${idx*0.035}s`;
    card.innerHTML=`
      <div class="card-top">
        <div><div class="aname">${asset.name}</div><div class="asym">${asset.symbol}</div></div>
        <div class="pblock"><div class="price" style="color:var(--muted)">UNAVAIL.</div><div class="chg" style="color:var(--muted)">price N/A</div></div>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);padding:20px 0;text-align:center;letter-spacing:1px">SPOT PRICE FEED UNAVAILABLE<br>CHECK KITCO.COM FOR SILVER SPOT</div>
    `;
    document.getElementById('grid').appendChild(card);
    return null;
  }
  const spark = asset.spark && asset.spark.length > 20 ? asset.spark : fakeSparkline(asset.price, asset.chg24);
  const rsi   = calcRSI(spark);
  const sma20 = calcSMA(spark, Math.min(20, spark.length));
  const sma50 = calcSMA(spark, Math.min(50, spark.length));
  const {signal, reason} = getSignal(rsi, asset.price, sma20, sma50, asset.chg24);

  const rsiCol = rsi===null?'var(--muted)':rsi<35?'var(--green)':rsi>70?'var(--red)':rsi>55?'var(--gold)':'var(--text)';
  const rsiLbl = rsi===null?'—':rsi<35?'OVERSOLD':rsi>70?'OVERBOUGHT':rsi>55?'ELEVATED':rsi<45?'LOW':'NEUTRAL';
  const ma20s  = sma20?(asset.price>sma20?'above':'below'):'';
  const ma50s  = sma50?(asset.price>sma50?'above':'below'):'';

  const card = document.createElement('div');
  card.className='card';
  card.dataset.type=asset.type;
  card.dataset.signal=signal;
  card.style.cssText=`--ca:${asset.color};animation-delay:${idx*0.035}s`;

  card.innerHTML=`
    <div class="card-top">
      <div><div class="aname">${asset.name}</div><div class="asym">${asset.symbol}</div></div>
      <div class="pblock">
        <div class="price">${fmtPrice(asset.price)}</div>
        <div class="chg ${asset.chg24>=0?'up':'dn'}">${asset.chg24>=0?'▲':'▼'} ${Math.abs(asset.chg24).toFixed(2)}%</div>
      </div>
    </div>
    <div class="spark"><canvas id="c-${asset.symbol}"></canvas></div>
    <div class="inds">
      <div class="ind">
        <div class="ilabel">RSI (14)</div>
        <div class="ival" style="color:${rsiCol}">${rsi!==null?rsi.toFixed(1):'—'}</div>
        <div class="isig" style="color:${rsiCol}">${rsiLbl}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${rsi||0}%;background:${rsiCol}"></div></div>
      </div>
      <div class="ind">
        <div class="ilabel">24H CHANGE</div>
        <div class="ival" style="color:${asset.chg24>=0?'var(--green)':'var(--red)'}">${asset.chg24>=0?'+':''}${asset.chg24.toFixed(2)}%</div>
        <div class="isig" style="color:var(--muted)">${Math.abs(asset.chg24)>6?'VOLATILE':'STABLE'}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(Math.abs(asset.chg24)*4,100)}%;background:${asset.chg24>=0?'var(--green)':'var(--red)'}"></div></div>
      </div>
      <div class="ind">
        <div class="ilabel">MA20</div>
        <div class="ival" style="color:${ma20s==='above'?'var(--green)':'var(--red)'}">${fmtPrice(sma20)}</div>
        ${ma20s?`<span class="ma-tag ${ma20s}">PRICE ${ma20s.toUpperCase()}</span>`:''}
      </div>
      <div class="ind">
        <div class="ilabel">MA50</div>
        <div class="ival" style="color:${ma50s==='above'?'var(--green)':'var(--red)'}">${fmtPrice(sma50)}</div>
        ${ma50s?`<span class="ma-tag ${ma50s}">PRICE ${ma50s.toUpperCase()}</span>`:''}
      </div>
    </div>
    <div class="sbadge ${signal}"><span class="pdot"></span> ${signal} — ${reason}</div>`;

  document.getElementById('grid').appendChild(card);

  setTimeout(()=>{
    const ctx=document.getElementById(`c-${asset.symbol}`)?.getContext('2d');
    if(!ctx)return;
    if(charts[asset.symbol])charts[asset.symbol].destroy();
    const isUp=spark[spark.length-1]>=spark[0];
    const lc=isUp?'#00ff88':'#ff3d5a';
    charts[asset.symbol]=new Chart(ctx,{
      type:'line',
      data:{labels:spark.map((_,i)=>i),datasets:[{data:spark,borderColor:lc,borderWidth:1.5,pointRadius:0,fill:true,tension:0.3,
        backgroundColor:c=>{const g=c.chart.ctx.createLinearGradient(0,0,0,90);g.addColorStop(0,isUp?'rgba(0,255,136,.18)':'rgba(255,61,90,.18)');g.addColorStop(1,'rgba(0,0,0,0)');return g;}}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:600},plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}
    });
  },60);

  return {signal, symbol:asset.symbol};
}

function updateSigBar(signals) {
  const bar=document.getElementById('sigBar');
  bar.innerHTML='';
  const active=signals.filter(s=>s.signal!=='HOLD');
  if(!active.length){
    bar.innerHTML='<div style="font-family:Space Mono;font-size:9px;color:var(--muted);letter-spacing:2px">NO STRONG SIGNALS — MARKET IN CONSOLIDATION</div>';
    return;
  }
  active.forEach((s,i)=>{
    const cls=s.signal==='BUY'?'buy':s.signal==='SELL'?'sell':'watch';
    const p=document.createElement('div');
    p.className=`pill ${cls}`;
    p.style.animationDelay=`${i*0.07}s`;
    p.innerHTML=`<span class="pdot"></span>${s.symbol} — ${s.signal}`;
    bar.appendChild(p);
  });
}

let activeTab = 'all';
let activeSignal = 'all';

function applyFilters() {
  document.querySelectorAll('#grid .card').forEach(card => {
    const typeMatch = activeTab === 'all' || card.dataset.type === activeTab;
    const sigMatch  = activeSignal === 'all' || card.dataset.signal.toLowerCase() === activeSignal;
    card.style.display = (typeMatch && sigMatch) ? '' : 'none';
  });
}

function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function filterSignal(sig, el) {
  activeSignal = sig;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active-buy','active-sell','active-watch','active-hold');
  });
  if (sig !== 'all') el.classList.add(`active-${sig}`);
  applyFilters();
}

function setLoader(pct,msg){
  document.getElementById('lfill').style.width=pct+'%';
  if(msg) document.getElementById('lsub').textContent=msg;
}

// ── MAIN LOAD ────────────────────────────────────────────────

async function loadAll() {
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='↻ LOADING...';
  document.getElementById('errBar').style.display='none';
  document.getElementById('apiSrc').textContent='';
  document.getElementById('grid').innerHTML='';
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  // Reset filters on refresh
  activeTab='all'; activeSignal='all';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab').classList.add('active');
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active-buy','active-sell','active-watch','active-hold'));

  const loader=document.getElementById('loader');
  loader.style.display='flex';
  setLoader(10,'TRYING COINGECKO...');

  let cryptoAssets=[], source='';

  // Fetch metals separately always
  setLoader(20,'FETCHING METALS...');
  const metalAssets = await fetchMetals();

  // Try each crypto API in order
  const attempts = [
    { name:'CoinGecko', fn: tryCoingecko },
    { name:'CoinCap',   fn: tryCoincap   },
    { name:'Binance',   fn: tryBinance   },
  ];

  for (const attempt of attempts) {
    try {
      setLoader(50, `FETCHING CRYPTO (${attempt.name.toUpperCase()})...`);
      cryptoAssets = await attempt.fn();
      if (cryptoAssets && cryptoAssets.length > 0) { source=attempt.name; break; }
    } catch(e) {
      console.warn(`${attempt.name} failed:`, e.message);
    }
  }

  setLoader(75,'CALCULATING SIGNALS...');

  const assets = [...metalAssets, ...cryptoAssets];

  if (!assets.length) {
    loader.style.display='none';
    document.getElementById('errBar').style.display='block';
    document.getElementById('errBar').textContent='⚠ All price APIs are currently unavailable. Please try refreshing in a minute.';
    btn.disabled=false; btn.textContent='↻ REFRESH';
    return;
  }

  setLoader(90,'RENDERING...');
  const signals=[];
  assets.forEach((a,i)=>{ const s=renderCard(a,i); if(s)signals.push(s); });
  updateSigBar(signals);
  document.getElementById('ts').textContent='LIVE · '+new Date().toLocaleTimeString();
  document.getElementById('apiSrc').textContent='DATA: '+(source||'COINGECKO').toUpperCase()+' · PRICES IN USD · REFRESH FOR LATEST';

  setLoader(100);
  setTimeout(()=>{ loader.style.display='none'; },300);
  btn.disabled=false; btn.textContent='↻ REFRESH';
}

window.addEventListener('load',()=>{ setTimeout(loadAll,300); });
</script>
