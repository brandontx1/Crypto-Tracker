<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>₿ To The Moon!!</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
:root {
  --bg:#090c10; --surface:#0e1318; --surface2:#141b22; --border:#1e2d3d;
  --text:#c9d8e8; --muted:#4a6278; --accent:#00e5ff;
  --green:#00ff88; --red:#ff3d5a; --gold:#ffc947; --silver:#b0c4d8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 700px 500px at 15% 15%,rgba(0,229,255,.05),transparent 65%),radial-gradient(ellipse 500px 700px at 85% 85%,rgba(168,85,247,.05),transparent 65%);pointer-events:none;z-index:0}
.wrap{max-width:1400px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* HEADER */
header{padding:16px 0 14px;border-bottom:1px solid var(–border);display:flex;flex-direction:column;gap:12px}
.header-brand{display:flex;align-items:center;gap:18px}
.logo-text{font-family:‘Space Mono’,monospace;font-size:26px;font-weight:700;color:var(–gold);text-shadow:0 0 30px rgba(255,201,71,.7),0 0 60px rgba(255,201,71,.25);letter-spacing:3px;line-height:1.25}
.header-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ts{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);letter-spacing:1px}
@media(min-width:600px){
header{flex-direction:row;align-items:center;justify-content:space-between;}
.header-brand{flex:1}
}

/* BUTTONS */
.btn{background:#0d2035;border:1px solid var(–accent);color:#e0f8ff;padding:10px 18px;font-family:‘Space Mono’,monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;border-radius:24px;box-shadow:0 0 14px rgba(0,229,255,.2)}
.btn:hover{background:#164060;box-shadow:0 0 22px rgba(0,229,255,.4);color:#ffffff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-news{background:#0d2035;border:1px solid var(–gold);color:#fff5cc;padding:10px 18px;font-family:‘Space Mono’,monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;border-radius:24px;box-shadow:0 0 14px rgba(255,201,71,.2)}
.btn-news:hover{background:#2a1a05;box-shadow:0 0 22px rgba(255,201,71,.4);color:#ffffff}

/* SEARCH */
.search-wrap{padding:14px 0;border-bottom:1px solid var(–border);position:relative}
.search-input{width:100%;background:#0d1e2e;border:1px solid var(–accent);color:#e0f8ff;padding:12px 44px 12px 16px;font-family:‘Space Mono’,monospace;font-size:11px;letter-spacing:1px;border-radius:24px;outline:none;transition:all .2s;box-shadow:0 0 10px rgba(0,229,255,.1)}
.search-input:focus{border-color:var(–accent);box-shadow:0 0 16px rgba(0,229,255,.25)}
.search-input::placeholder{color:rgba(0,229,255,.45)}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(–accent);font-size:16px;pointer-events:none}
.search-clear{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(–accent);font-size:18px;cursor:pointer;display:none;background:none;border:none;line-height:1}
.search-clear:hover{color:#ffffff}

/* TABS */
.tabs{display:flex;gap:10px;padding:14px 0;flex-wrap:wrap;border-bottom:1px solid var(–border)}
.tab{padding:11px 22px;background:#0d1e2e;border:1px solid var(–accent);color:#e0f8ff;font-family:‘Space Mono’,monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;white-space:nowrap;border-radius:24px;flex:1;text-align:center;box-shadow:0 0 8px rgba(0,229,255,.1)}
.tab:hover{background:#0d2540;box-shadow:0 0 14px rgba(0,229,255,.25);color:#ffffff}
.tab.active{background:#0d2540;border-color:var(–accent);color:#ffffff;font-weight:700;box-shadow:0 0 18px rgba(0,229,255,.4)}

/* FILTER BUTTONS */
.filter-row{display:flex;gap:10px;padding:12px 0;flex-wrap:wrap;border-bottom:1px solid var(–border)}
.filter-btn{padding:11px 0;background:#0d1e2e;border:1px solid var(–accent);color:#e0f8ff;font-family:‘Space Mono’,monospace;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s;border-radius:24px;flex:1;text-align:center;min-width:calc(33% - 8px);box-shadow:0 0 8px rgba(0,229,255,.1)}
.filter-btn:hover{background:#0d2540;box-shadow:0 0 14px rgba(0,229,255,.25);color:#ffffff}
.filter-btn.active-buy{background:#0a2818;border-color:var(–green);color:#aaffcc;font-weight:700;box-shadow:0 0 14px rgba(0,255,136,.35)}
.filter-btn.active-sell{background:#280a12;border-color:var(–red);color:#ffaaaa;font-weight:700;box-shadow:0 0 14px rgba(255,61,90,.35)}
.filter-btn.active-watch{background:#281e08;border-color:var(–gold);color:#ffe599;font-weight:700;box-shadow:0 0 14px rgba(255,201,71,.35)}
.filter-btn.active-hold{background:#0d2540;border-color:var(–accent);color:#ffffff;font-weight:700;box-shadow:0 0 14px rgba(0,229,255,.35)}

/* SIGNAL BAR */
.sig-bar{display:flex;gap:8px;padding:12px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(–border);min-height:48px;align-items:center}
.sig-bar::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:6px;padding:4px 12px;font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:1px;white-space:nowrap;border:1px solid;opacity:0;animation:fadeIn .5s ease forwards}
.pill.buy{border-color:var(–green);color:var(–green);background:rgba(0,255,136,.06)}
.pill.sell{border-color:var(–red);color:var(–red);background:rgba(255,61,90,.06)}
.pill.watch{border-color:var(–gold);color:var(–gold);background:rgba(255,201,71,.06)}
.pdot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}

/* GRID & CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:13px;padding:16px 0 40px}
.card{background:var(–surface);border:1px solid var(–border);padding:17px;position:relative;overflow:hidden;opacity:0;transform:translateY(6px);animation:slideUp .45s ease forwards;transition:border-color .2s,box-shadow .2s}
.card.highlighted{border-color:var(–accent);box-shadow:0 0 20px rgba(0,229,255,.25)}
.card::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:var(–ca,var(–accent));opacity:.75}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.aname{font-size:12px;font-weight:800;letter-spacing:2px}
.asym{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);margin-top:2px;letter-spacing:1px}
.pblock{text-align:right}
.price{font-family:‘Space Mono’,monospace;font-size:16px;font-weight:700}
.chg{font-family:‘Space Mono’,monospace;font-size:10px;margin-top:2px}
.chg.up{color:var(–green)}.chg.dn{color:var(–red)}
.spark{height:90px;margin:8px 0;cursor:pointer;position:relative}
.spark:hover::after{content:‘TAP TO EXPAND’;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:‘Space Mono’,monospace;font-size:9px;letter-spacing:2px;color:var(–accent);background:rgba(9,12,16,.6);border:1px solid rgba(0,229,255,.2)}
.inds{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.ind{background:var(–surface2);border:1px solid var(–border);padding:7px 8px}
.ilabel{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);letter-spacing:1px;margin-bottom:2px}
.ival{font-family:‘Space Mono’,monospace;font-size:12px;font-weight:700}
.isig{font-size:8px;margin-top:1px;letter-spacing:1px;font-family:‘Space Mono’,monospace}
.bar-bg{height:3px;background:var(–border);margin-top:4px;overflow:hidden}
.bar-fill{height:100%;transition:width 1s ease}
.ma-tag{font-family:‘Space Mono’,monospace;font-size:8px;padding:2px 5px;border:1px solid;letter-spacing:1px;display:inline-block;margin-top:3px}
.ma-tag.above{border-color:rgba(0,255,136,.4);color:var(–green)}
.ma-tag.below{border-color:rgba(255,61,90,.4);color:var(–red)}
.sbadge{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px;font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:2px;font-weight:700;margin-top:10px;border:1px solid;width:100%}
.sbadge.BUY{border-color:var(–green);color:var(–green);background:rgba(0,255,136,.07)}
.sbadge.SELL{border-color:var(–red);color:var(–red);background:rgba(255,61,90,.07)}
.sbadge.HOLD{border-color:var(–muted);color:var(–muted)}
.sbadge.WATCH{border-color:var(–gold);color:var(–gold);background:rgba(255,201,71,.07)}

/* LOADER / HERO SPLASH */
#loader{position:fixed;inset:0;background:var(–bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:0;transition:opacity .6s ease}
#loader.hide{opacity:0;pointer-events:none}
.hero-moon{display:flex;flex-direction:column;align-items:center;gap:16px;animation:heroFloat 3s ease-in-out infinite}
.hero-title{font-family:‘Space Mono’,monospace;font-size:28px;font-weight:700;color:var(–gold);text-shadow:0 0 30px rgba(255,201,71,.8),0 0 60px rgba(255,201,71,.3);letter-spacing:4px;text-align:center;line-height:1.3}
.hero-sub{font-family:‘Space Mono’,monospace;font-size:10px;color:var(–muted);letter-spacing:3px;margin-top:4px}
.lbar{width:220px;height:2px;background:var(–border);overflow:hidden;margin-top:24px}
.lfill{height:100%;background:var(–accent);width:0;box-shadow:0 0 10px var(–accent);transition:width .4s ease}
.lsub{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);letter-spacing:2px;margin-top:10px}

/* Stars behind hero */
.hero-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(–dur,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:var(–lo,.2)}50%{opacity:var(–hi,.9)}}
@keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Sticky compact header — hidden until hero dismisses */
#siteHeader{
position:sticky;top:0;z-index:100;
background:rgba(9,12,16,.96);
backdrop-filter:blur(12px);
border-bottom:1px solid var(–border);
padding:10px 0;
opacity:0;transform:translateY(-20px);
transition:opacity .5s ease, transform .5s ease;
}
#siteHeader.visible{opacity:1;transform:translateY(0)}
.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-brand{display:flex;align-items:center;gap:12px}
.logo-text{font-family:‘Space Mono’,monospace;font-size:18px;font-weight:700;color:var(–gold);text-shadow:0 0 20px rgba(255,201,71,.6);letter-spacing:3px;line-height:1.2}
.header-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ts{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);letter-spacing:1px}
@media(max-width:480px){.logo-text{font-size:14px;letter-spacing:2px}}

/* CHART MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#0c1520;border:1px solid var(–border);padding:20px;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;position:relative;border-radius:4px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:14px;font-weight:800;letter-spacing:2px}
.modal-price{font-family:‘Space Mono’,monospace;font-size:20px;font-weight:700}
.modal-chg{font-family:‘Space Mono’,monospace;font-size:11px;margin-top:2px}
.modal-close{background:transparent;border:1px solid var(–muted);color:var(–muted);width:32px;height:32px;cursor:pointer;font-size:16px;border-radius:50%;transition:all .2s}
.modal-close:hover{border-color:var(–red);color:var(–red)}
.modal-chart{height:300px;margin:8px 0;position:relative}
.modal-hover-info{font-family:‘Space Mono’,monospace;font-size:11px;color:var(–accent);text-align:center;letter-spacing:1px;min-height:20px;padding:6px;background:#0a1520;border:1px solid var(–border);border-radius:4px;margin-bottom:8px}
.modal-inds{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:16px}
.modal-ind{background:var(–surface2);border:1px solid var(–border);padding:10px 12px}

/* NEWS MODAL */
.news-modal{background:#0c1520;border:1px solid var(–border);padding:20px;width:100%;max-width:700px;max-height:88vh;overflow-y:auto;position:relative;border-radius:4px}
.news-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid var(–border);padding-bottom:12px}
.news-title{font-family:‘Space Mono’,monospace;font-size:12px;letter-spacing:3px;color:var(–gold)}
.news-item{padding:14px 0;border-bottom:1px solid var(–border);cursor:pointer;transition:background .2s}
.news-item:hover{background:rgba(14,19,24,.9);margin:0 -20px;padding:14px 20px}
.news-item:last-child{border-bottom:none}
.news-source{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–accent);letter-spacing:2px;margin-bottom:5px}
.news-headline{font-size:13px;font-weight:600;line-height:1.4;color:var(–text);margin-bottom:4px}
.news-date{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);letter-spacing:1px}
.news-loading{font-family:‘Space Mono’,monospace;font-size:10px;color:var(–muted);text-align:center;padding:30px;letter-spacing:2px}
.news-err{font-family:‘Space Mono’,monospace;font-size:10px;color:var(–red);text-align:center;padding:20px;letter-spacing:1px}

.err-bar{font-family:‘Space Mono’,monospace;font-size:10px;color:var(–red);padding:10px 14px;border:1px solid var(–red);background:rgba(255,61,90,.06);margin:14px 0;letter-spacing:1px;display:none}
.api-src{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);padding:6px 0;letter-spacing:1px;border-top:1px solid var(–border);margin-top:4px}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes slideUp{to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}.modal-chart{height:220px}.logo-text{font-size:12px}}
</style>

</head>
<body>

<!-- HERO SPLASH -->

<div id="loader">
  <div class="hero-stars" id="heroStars"></div>
  <div class="hero-moon">
    <svg width="220" height="220" viewBox="0 0 180 180">
      <defs>
        <radialGradient id="lg1" cx="38%" cy="32%" r="62%">
          <stop offset="0%" stop-color="#f8f4e0"/>
          <stop offset="45%" stop-color="#d4c88a"/>
          <stop offset="100%" stop-color="#7a8a9a"/>
        </radialGradient>
        <filter id="mglow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- Full moon -->
      <circle cx="90" cy="100" r="72" fill="url(#lg1)" filter="url(#mglow)"/>
      <ellipse cx="108" cy="82" rx="56" ry="48" fill="rgba(120,140,170,0.15)"/>
      <!-- Craters -->
      <circle cx="62" cy="78" r="9" fill="#b8a870" opacity="0.5"/>
      <circle cx="60" cy="76" r="6" fill="#c8b880" opacity="0.2"/>
      <circle cx="74" cy="118" r="8" fill="#b8a870" opacity="0.45"/>
      <circle cx="112" cy="108" r="6" fill="#b8a870" opacity="0.35"/>
      <circle cx="50" cy="105" r="5" fill="#b8a870" opacity="0.4"/>
      <circle cx="100" cy="68" r="5" fill="#b8a870" opacity="0.3"/>
      <circle cx="125" cy="88" r="3" fill="#b8a870" opacity="0.25"/>
      <circle cx="78" cy="132" r="4" fill="#b8a870" opacity="0.3"/>
      <!-- Flag pole -->
      <line x1="90" y1="28" x2="90" y2="100" stroke="#f7931a" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Flag -->
      <rect x="90" y="28" width="62" height="38" rx="4" fill="#f7931a"/>
      <text x="121" y="54" text-anchor="middle" font-size="26" font-weight="900" fill="white" font-family="Arial">₿</text>
      <!-- Ground shadow -->
      <ellipse cx="90" cy="172" rx="72" ry="10" fill="#c8b870" opacity="0.2"/>
    </svg>
    <div class="hero-title">₿ TO THE<br>MOON!!</div>
    <div class="hero-sub" id="lsub">FETCHING LIVE DATA...</div>
    <div class="lbar"><div class="lfill" id="lfill"></div></div>
  </div>
</div>

<div class="wrap">
  <!-- STICKY COMPACT HEADER -->
  <div id="siteHeader">
    <div class="wrap">
      <div class="header-inner">
        <div class="header-brand">
          <svg width="52" height="52" viewBox="0 0 180 180">
            <defs>
              <radialGradient id="hg1" cx="38%" cy="32%" r="62%">
                <stop offset="0%" stop-color="#f8f4e0"/>
                <stop offset="45%" stop-color="#d4c88a"/>
                <stop offset="100%" stop-color="#7a8a9a"/>
              </radialGradient>
              <filter id="hglow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <circle cx="90" cy="100" r="72" fill="url(#hg1)" filter="url(#hglow)"/>
            <ellipse cx="108" cy="82" rx="56" ry="48" fill="rgba(120,140,170,0.15)"/>
            <circle cx="62" cy="78" r="9" fill="#b8a870" opacity="0.5"/>
            <circle cx="74" cy="118" r="8" fill="#b8a870" opacity="0.4"/>
            <circle cx="112" cy="108" r="6" fill="#b8a870" opacity="0.35"/>
            <circle cx="50" cy="105" r="5" fill="#b8a870" opacity="0.4"/>
            <line x1="90" y1="28" x2="90" y2="100" stroke="#f7931a" stroke-width="3.5" stroke-linecap="round"/>
            <rect x="90" y="28" width="62" height="38" rx="4" fill="#f7931a"/>
            <text x="121" y="54" text-anchor="middle" font-size="26" font-weight="900" fill="white" font-family="Arial">₿</text>
          </svg>
          <div class="logo-text">₿ TO THE MOON!!</div>
        </div>
        <div class="header-controls">
          <div class="ts" id="ts">—</div>
          <button class="btn-news" onclick="openNews()">📰 NEWS</button>
          <button class="btn" id="refreshBtn" onclick="loadAll()">↻ REFRESH</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SEARCH -->

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="🔍  SEARCH ASSETS..." oninput="doSearch(this.value)"/>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <!-- TABS -->

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all',this)">ALL ASSETS</button>
    <button class="tab" onclick="switchTab('crypto',this)">CRYPTO</button>
    <button class="tab" onclick="switchTab('metals',this)">METALS</button>
  </div>

  <!-- FILTER BUTTONS -->

  <div class="filter-row">
    <button class="filter-btn" onclick="filterSignal('buy',this)">● BUY</button>
    <button class="filter-btn" onclick="filterSignal('watch',this)">● WATCH</button>
    <button class="filter-btn" onclick="filterSignal('hold',this)">● HOLD</button>
    <button class="filter-btn" onclick="filterSignal('sell',this)">● SELL</button>
    <button class="filter-btn" onclick="filterSignal('all',this)">SHOW ALL</button>
  </div>

  <div class="sig-bar" id="sigBar"></div>
  <div class="err-bar" id="errBar"></div>
  <div class="api-src" id="apiSrc"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- CHART MODAL -->

<div class="modal-bg" id="chartModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">—</div>
        <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px" id="modalSym">—</div>
      </div>
      <div style="text-align:right">
        <div class="modal-price" id="modalPrice">—</div>
        <div class="modal-chg" id="modalChg">—</div>
      </div>
      <button class="modal-close" onclick="closeChart()">✕</button>
    </div>
    <div class="modal-hover-info" id="modalHover">HOVER OR TAP CHART FOR PRICE AT THAT TIME</div>
    <div class="modal-chart"><canvas id="modalCanvas"></canvas></div>
    <div class="modal-inds" id="modalInds"></div>
  </div>
</div>

<!-- NEWS MODAL -->

<div class="modal-bg" id="newsModal">
  <div class="news-modal">
    <div class="news-header">
      <div class="news-title">📰 CRYPTO & METALS NEWS</div>
      <button class="modal-close" onclick="closeNews()">✕</button>
    </div>
    <div id="newsFeed"><div class="news-loading">LOADING LATEST NEWS...</div></div>
  </div>
</div>

<script>
let charts = {};
let modalChart = null;
let activeTab = 'all';
let activeSignal = 'all';
let allAssetData = [];

const COLORS = {

// ── UTILS ────────────────────────────────────────────────────
function fmtPrice(p) {
  if (!p && p!==0) return '$—';
  if (p>=1000) return '$'+p.toLocaleString('en-US',{maximumFractionDigits:0});
  if (p>=1)    return '$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});
  if (p>=0.001)return '$'+p.toFixed(5);
  return '$'+p.toFixed(8);
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function fetchWithTimeout(url, ms=20000) {
  const ctrl = new AbortController();
  const id = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {signal:ctrl.signal}).finally(()=>clearTimeout(id));
}

// ── INDICATORS ───────────────────────────────────────────────
function calcRSI(prices, period=14) {
  if (!prices||prices.length<period+1) return null;
  let g=0,l=0;
  for (let i=prices.length-period;i<prices.length;i++) {
    const d=prices[i]-prices[i-1];
    if(d>0)g+=d;else l-=d;
  }
  const ag=g/period,al=l/period;
  if(al===0)return 100;
  return 100-(100/(1+(ag/al)));
}
function calcSMA(prices,n) {
  if(!prices||prices.length<n)return null;
  return prices.slice(-n).reduce((a,b)=>a+b,0)/n;
}
function fakeSparkline(price,chg24) {
  const pts=60; let p=price/(1+chg24/100); const out=[];
  for(let i=0;i<pts;i++){const n=(Math.random()-.5)*p*0.014;p=p+(chg24/100)*p*(1/pts)*0.8+n;out.push(Math.max(p,0.000001));}
  out[out.length-1]=price; return out;
}
function getSignal(rsi,price,sma20,sma50,chg24) {
  let score=0,reasons=[];
  if(rsi!==null){
    if(rsi<30){score+=3;reasons.push('RSI oversold');}
    else if(rsi<42){score+=1;reasons.push('RSI low');}
    else if(rsi>72){score-=3;reasons.push('RSI overbought');}
    else if(rsi>62){score-=1;reasons.push('RSI elevated');}
  }
  if(sma20&&sma50){
    if(price>sma20&&sma20>sma50){score+=1;reasons.push('Bullish MA stack');}
    if(price<sma20&&sma20<sma50){score-=1;reasons.push('Bearish MA stack');}
    if(price<sma20*0.95){score+=1;reasons.push('Dip below MA20');}
    if(price>sma20*1.08){score-=1;reasons.push('Extended above MA20');}
  }
  if(chg24<-8){score+=1;reasons.push('Large dip today');}
  if(chg24>12){score-=1;reasons.push('Large pump today');}
  let signal='HOLD';
  if(score>=3)signal='BUY';
  else if(score>=1)signal='WATCH';
  else if(score<=-2)signal='SELL';
  return{signal,reason:reasons[0]||'Monitoring'};
}

// ── CHART MODAL ──────────────────────────────────────────────
function openChart(asset) {
  const spark = asset.spark&&asset.spark.length>10 ? asset.spark : fakeSparkline(asset.price,asset.chg24);
  const rsi=calcRSI(spark),sma20=calcSMA(spark,Math.min(20,spark.length)),sma50=calcSMA(spark,Math.min(50,spark.length));
  const {signal,reason}=getSignal(rsi,asset.price,sma20,sma50,asset.chg24);

  document.getElementById('modalTitle').textContent=asset.name;
  document.getElementById('modalSym').textContent=asset.symbol;
  document.getElementById('modalPrice').textContent=fmtPrice(asset.price);
  const chgEl=document.getElementById('modalChg');
  chgEl.textContent=(asset.chg24>=0?'▲ +':'▼ ')+asset.chg24.toFixed(2)+'%';
  chgEl.style.color=asset.chg24>=0?'var(--green)':'var(--red)';

  // Build indicator boxes
  const rsiCol=rsi===null?'var(--muted)':rsi<35?'var(--green)':rsi>70?'var(--red)':'var(--gold)';
  const rsiLbl=rsi===null?'—':rsi<35?'OVERSOLD':rsi>70?'OVERBOUGHT':rsi>55?'ELEVATED':'NEUTRAL';
  document.getElementById('modalInds').innerHTML=`
    <div class="modal-ind"><div class="ilabel">RSI (14)</div><div class="ival" style="color:${rsiCol}">${rsi!==null?rsi.toFixed(1):'—'}</div><div class="isig" style="color:${rsiCol}">${rsiLbl}</div></div>
    <div class="modal-ind"><div class="ilabel">24H CHANGE</div><div class="ival" style="color:${asset.chg24>=0?'var(--green)':'var(--red)'}">${asset.chg24>=0?'+':''}${asset.chg24.toFixed(2)}%</div></div>
    <div class="modal-ind"><div class="ilabel">MA20</div><div class="ival" style="color:${sma20&&asset.price>sma20?'var(--green)':'var(--red)'}">${fmtPrice(sma20)}</div><div class="isig">${sma20?(asset.price>sma20?'PRICE ABOVE':'PRICE BELOW'):''}</div></div>
    <div class="modal-ind"><div class="ilabel">MA50</div><div class="ival" style="color:${sma50&&asset.price>sma50?'var(--green)':'var(--red)'}">${fmtPrice(sma50)}</div><div class="isig">${sma50?(asset.price>sma50?'PRICE ABOVE':'PRICE BELOW'):''}</div></div>
    <div class="modal-ind" style="grid-column:span 2"><div class="ilabel">SIGNAL</div><div class="ival" style="color:${signal==='BUY'?'var(--green)':signal==='SELL'?'var(--red)':signal==='WATCH'?'var(--gold)':'var(--muted)'}">${signal}</div><div class="isig" style="color:var(--muted)">${reason}</div></div>
  `;

  document.getElementById('chartModal').classList.add('open');

  setTimeout(()=>{
    const ctx=document.getElementById('modalCanvas').getContext('2d');
    if(modalChart)modalChart.destroy();
    const isUp=spark[spark.length-1]>=spark[0];
    const lc=isUp?'#00ff88':'#ff3d5a';

    // Build time labels (7 days back from now, hourly)
    const now=Date.now();
    const labels=spark.map((_,i)=>now-(spark.length-1-i)*3600000);

    modalChart=new Chart(ctx,{
      type:'line',
      data:{
        labels,
        datasets:[{
          data:spark,borderColor:lc,borderWidth:2,pointRadius:0,
          pointHoverRadius:6,pointHoverBackgroundColor:lc,pointHoverBorderColor:'#fff',
          fill:true,tension:0.3,
          backgroundColor:c=>{const g=c.chart.ctx.createLinearGradient(0,0,0,300);g.addColorStop(0,isUp?'rgba(0,255,136,.2)':'rgba(255,61,90,.2)');g.addColorStop(1,'rgba(0,0,0,0)');return g;}
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            enabled:false,
            external:(ctx)=>{
              const el=document.getElementById('modalHover');
              if(!el)return;
              if(ctx.tooltip.opacity===0){el.textContent='HOVER OR TAP CHART FOR PRICE AT THAT TIME';el.style.color='var(--muted)';return;}
              const dp=ctx.tooltip.dataPoints?.[0];
              if(dp){el.textContent=fmtDate(labels[dp.dataIndex])+'   ·   '+fmtPrice(dp.raw);el.style.color='var(--accent)';}
            }
          }
        },
        scales:{
          x:{display:true,grid:{color:'rgba(30,45,61,.4)'},ticks:{color:'#4a6278',font:{family:'Space Mono',size:8},maxTicksLimit:7,callback:(_,i,arr)=>{if(i===0||i===arr.length-1||i===Math.floor(arr.length/2)){return fmtDate(labels[i]).split(' ').slice(0,2).join(' ');}return '';}}},

        }
      }
    });
  },50);
}

    {name:'COINDESK', url:'https://www.coindesk.com/arc/outboundfeeds/rss/'},

  ];

  const proxy='https://api.rss2json.com/v1/api.json?rss_url=';
  let allItems=[];

  for(const src of sources) {
    try {
      const r=await fetchWithTimeout(`${proxy}${encodeURIComponent(src.url)}`,8000);
      if(r.ok){
        const d=await r.json();
        if(d.items){
          allItems=[...allItems,...d.items.slice(0,8).map(i=>({...i,source:src.name}))];
        }
      }
    } catch(e){console.warn(src.name+' news failed:',e.message);}

      <a href="https://cointelegraph.com" target="_blank" style="color:var(--accent)">cointelegraph.com</a></span></div>`;
    return;
  }

  // Sort by date
  allItems.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));

  document.getElementById('newsFeed').innerHTML=allItems.map(item=>`
    <div class="news-item" onclick="window.open('${item.link}','_blank')">

      <div class="news-headline">${item.title}</div>

function doSearch(val) {
  const q=val.trim().toLowerCase();
  const clearBtn=document.getElementById('searchClear');
  const icon=document.getElementById('searchIcon');
  clearBtn.style.display=q?'block':'none';

  document.querySelectorAll('#grid .card').forEach(card=>{
    card.classList.remove('highlighted');
    if(!q){card.style.display='';return;}
    const name=card.dataset.name||'';
    const sym=card.dataset.sym||'';
    const match=name.includes(q)||sym.includes(q);
    card.style.display=match?'':'none';
    if(match)card.classList.add('highlighted');
  });

  // Scroll to first match
  if(q){
    const first=document.querySelector('#grid .card.highlighted');
    if(first)setTimeout(()=>first.scrollIntoView({behavior:'smooth',block:'center'}),100);
  }
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').style.display='none';
  doSearch('');
}

// ── FILTERS ──────────────────────────────────────────────────
function applyFilters() {
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  document.querySelectorAll('#grid .card').forEach(card=>{
    const typeMatch=activeTab==='all'||card.dataset.type===activeTab;
    const sigMatch=activeSignal==='all'||card.dataset.signal.toLowerCase()===activeSignal;
    const searchMatch=!q||(card.dataset.name||'').includes(q)||(card.dataset.sym||'').includes(q);
    card.style.display=(typeMatch&&sigMatch&&searchMatch)?'':'none';
  });
}

function switchTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function filterSignal(sig,el){
  activeSignal=sig;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active-buy','active-sell','active-watch','active-hold'));
  if(sig!=='all')el.classList.add(`active-${sig}`);
  applyFilters();
}

async function tryCoingecko() {
  // Comprehensive blocklist of stablecoins, exchange tokens, institutional funds, and junk
  const BLOCK_SYMS = new Set([
    // Stablecoins
    'usdt','usdc','dai','busd','tusd','usdp','usdd','frax','lusd','gusd','usde','fdusd',
    'pyusd','eurc','usds','susd','xusd','eurs','ousd','dola','mim','alusd','usdc.e',
    'usd1','usdf','usdg','rlusd','usyc','usdc.e','usd+','cusd','husd','zusd','musd',
    // Gold/metals tokens (we handle these separately)
    'xaut','paxg',
    // Exchange/platform tokens that aren't real crypto investments
    'leo','wbt','buidl','ht',
    // Other known junk
    'bttc','luna','ustc','figr_heloc','figr','wlfi','cc','rain','m','sky','aster','htx'
  ]);

  const BLOCK_NAME_FRAGMENTS = [
    'wrapped','staked','bridged','tether gold','pax gold',
    'usd coin','usd dollar','dollar','institutional','liquidity fund',
    'yield','money market','treasury','t-bill','tokenized',
    'heloc','world liberty','memecore','whitebit','falcon'
  ];

  const r = await fetchWithTimeout('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=150&page=1&sparkline=true&price_change_percentage=24h');
  if(!r.ok) throw new Error('CoinGecko '+r.status);
  const data = await r.json();

  const filtered = data.filter(c => {
    const sym = c.symbol.toLowerCase();
    const name = c.name.toLowerCase();
    const price = c.current_price || 0;
    const vol = c.total_volume || 0;

    // Block known bad symbols
    if (BLOCK_SYMS.has(sym)) return false;

    // Block by name fragments
    if (BLOCK_NAME_FRAGMENTS.some(f => name.includes(f))) return false;

    // Block stablecoins by price ($0.95 - $1.05 range with near-zero change)
    if (price >= 0.94 && price <= 1.06 && Math.abs(c.price_change_percentage_24h||0) < 0.5) return false;

    // Block micro-caps with very low volume (under $2M/day — not worth tracking)
    if (vol < 2000000) return false;

    // Block symbols that start with 'usd' or end with 'usd'
    if (sym.startsWith('usd') || sym.endsWith('usd')) return false;

    return true;
  }).slice(0, 50);

  return filtered.map(c => ({
    symbol: c.symbol.toUpperCase(),
    name: c.name.toUpperCase(),
    price: c.current_price,
    chg24: c.price_change_percentage_24h || 0,
    spark: c.sparkline_in_7d?.price || [],
    type: 'crypto',
    color: COLORS[c.symbol.toUpperCase()] || '#00e5ff'
  }));
}

async function tryCoincap() {

async function loadAll(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.textContent='↻ LOADING...';
  document.getElementById('errBar').style.display='none';
  document.getElementById('apiSrc').textContent='';
  document.getElementById('grid').innerHTML='';
  Object.values(charts).forEach(c=>c.destroy());charts={};
  if(modalChart){modalChart.destroy();modalChart=null;}
  activeTab='all';activeSignal='all';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab').classList.add('active');
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active-buy','active-sell','active-watch','active-hold'));
  clearSearch();

  const loader=document.getElementById('loader');
  const isFirstLoad = loader.style.display !== 'none';
  if(!isFirstLoad){
    // On refresh, just show a subtle loading state — don't re-show full hero
    btn.textContent='↻ LOADING...';
  } else {
    loader.style.display='flex';
    loader.classList.remove('hide');
  }
  document.getElementById('lfill').style.width='10%';
  document.getElementById('lsub').textContent='FETCHING METALS...';

  try {
    const metalAssets=await fetchMetals();
    document.getElementById('lfill').style.width='30%';
    document.getElementById('lsub').textContent='FETCHING TOP 50 CRYPTO...';

    let cryptoAssets=[],source='';
    try{cryptoAssets=await tryCoingecko();source='CoinGecko';}
    catch(e){console.warn('CoinGecko failed:',e.message);try{cryptoAssets=await tryCoincap();source='CoinCap';}catch(e2){console.warn('CoinCap failed:',e2.message);}}

    document.getElementById('lfill').style.width='80%';
    document.getElementById('lsub').textContent='BUILDING SIGNALS...';

    allAssetData=[...metalAssets,...cryptoAssets];
    const signals=[];
    allAssetData.forEach((a,i)=>{const s=renderCard(a,i);if(s)signals.push(s);});
    updateSigBar(signals);
    document.getElementById('ts').textContent='LIVE · '+new Date().toLocaleTimeString();
    document.getElementById('apiSrc').textContent='DATA: '+(source||'COINGECKO').toUpperCase()+' · PRICES IN USD · TAP ANY CHART TO EXPAND';

    document.getElementById('lfill').style.width='100%';
    setTimeout(()=>{
      // Fade out hero
      const loader=document.getElementById('loader');
      loader.classList.add('hide');
      setTimeout(()=>{ loader.style.display='none'; },650);
      // Slide in sticky header
      setTimeout(()=>{ document.getElementById('siteHeader').classList.add('visible'); },400);
    },300);

    if(!cryptoAssets.length){
      document.getElementById('errBar').style.display='block';
      document.getElementById('errBar').textContent='⚠ Crypto prices unavailable — try refreshing in 30 seconds.';
    }
  } catch(e){
    const loader=document.getElementById('loader');
    loader.classList.add('hide');
    setTimeout(()=>{ loader.style.display='none'; },650);
    setTimeout(()=>{ document.getElementById('siteHeader').classList.add('visible'); },400);
    document.getElementById('errBar').style.display='block';
    document.getElementById('errBar').textContent='⚠ '+e.message;
  }

  btn.disabled=false;btn.textContent='↻ REFRESH';
}

// Generate random stars in hero
function generateStars(){
  const container=document.getElementById('heroStars');
  if(!container)return;
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=Math.random()*2.5+0.5;
    s.style.cssText=`
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      --dur:${(Math.random()*3+2).toFixed(1)}s;
      --lo:${(Math.random()*0.2+0.1).toFixed(2)};
      --hi:${(Math.random()*0.5+0.5).toFixed(2)};
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    container.appendChild(s);
  }
}

window.addEventListener('load',()=>{ generateStars(); setTimeout(loadAll,300); });
</script>

</body>
</html>
